HttpServer:
  Api:
    Port: ":20201"

Status:
  Webhook:
    Enabled: false
    URL: ""
    Events: ["complete", "error"]
    method: "POST"
    timeout: 5
    retry_count: 3
    retry_delay: 1000
  Store:
    Enabled: true
    Type: "memory"
    MySQL:
      Host: "127.0.0.1"
      Port: 3306
      User: "root"
      Password: ""
      Database: "digpdf"
      ExecTable: "df_execution"
      StatusTable: "df_execution_status"

WeChat:
  Enabled: false                    # 是否启用微信推送功能
  AppID: ""                         # 微信服务号 AppID
  AppSecret: ""                     # 微信服务号 AppSecret
  OpenIDs: []                       # 默认接收消息的用户 openid 列表
  TokenFilePath: "storage/app/wechat/access_token.json"  # AccessToken 存储文件路径
  MiniProgram:                      # 小程序配置（用于小程序卡片消息）
    AppID: ""                       # 小程序 AppID
    DefaultPath: "pages/index/index"  # 默认页面路径，例如 "pages/index/index"
    ThumbMediaID: ""                # 小程序卡片封面图片的 media_id

WeCom:
  Enabled: false                    # 是否启用企业微信推送功能
  CorpID: ""                        # 企业微信 CorpID（我的企业 > 企业信息）
  QYAPIHost: "https://qyapi.weixin.qq.com"  # 企业微信 API 地址（可选，支持自定义域名）
  TokenFilePath: "storage/app/wecom/access_token.json"
  Callback:                         # 客服回调配置（用于接收个人微信用户发送的消息）
    Enabled: false                  # 是否启用回调接收消息功能
    URL: ""                         # 回调 URL（如：https://your-domain.com/api/v1/wecom/callback）
    Token: ""                       # 回调 Token（企业微信管理后台配置）
    EncodingAESKey: ""             # 回调消息加密密钥（企业微信管理后台配置，43位Base64编码）
    Path: "/api/v1/wecom/callback" # 回调路径（相对路径，用于路由注册）
  Applications:
    - AgentID: 0                    # 企业微信应用 ID（应用管理 > 自建应用）
      AgentSecret: ""               # 应用 Secret
      ManageAllKFSession: false     # 是否管理所有客服会话（用于 send_wecom_customer_message 发给个人微信）

ChatModel:
  Type: "qwen"                      # 模型类型: qwen, openai
  Config:
    ApiKey: ""                       # API Key（支持环境变量 ${API_KEY}）
    Model: "qwen-max"                # 模型名称
    BaseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # API 地址
    # Temperature: 0.7               # 可选：温度参数
    # MaxTokens: 2048                 # 可选：最大 token 数

UIUX:
  Storage:
    BaseDir: "storage/app/ui_ux"     # 设计系统存储基础目录
    # 存储结构：
    # - 如果指定 AppName: {BaseDir}/{app-name}/design-system/{project}/MASTER.md
    # - 如果未指定: {BaseDir}/design-system/{project}/MASTER.md
    # 示例：
    # - AppName="travel": storage/app/ui_ux/travel/design-system/my-project/MASTER.md
    # - 未指定: storage/app/ui_ux/design-system/my-project/MASTER.md
  TempStorage:
    BaseDir: "storage/temp"          # 会话临时目录（write_review_file / 预览产物）
  Preview:
    MaxPatchFileBytes: 0             # 单文件 Patch 上限（字节），0 表示默认 5MiB
    AllowedExtensions: [".tsx", ".jsx", ".ts", ".js", ".html", ".htm", ".json", ".css", ".md"]  # literal_replace 允许后缀
    HistoryEnabled: true             # apply_preview_patch 写入前是否保留历史快照
    HistoryDir: "preview/history"    # 历史快照目录（相对 workspace/session 根目录）

Tools:
  Firecrawl:
    ApiKey: ""
  WebSearch:
    Engine: "bocha" # bocha, serpapi, google, bing, duckduckgo, firecrawl, tavily
    Bocha:
      ApiKey: ""
      BaseUrl: "https://api.bochaai.com"
    SerpApi:
      ApiKey: ""
      BaseUrl: "https://serpapi.com/search"
    Google:
      ApiKey: ""
      Cx: ""
      BaseUrl: "https://www.googleapis.com/customsearch/v1"
    Bing:
      ApiKey: ""
      MaxResults: 10
      Region: "en-US"
      SafeSearch: "Moderate" # Off, Moderate, Strict
    Tavily:
      ApiKey: ""                    # 或环境变量 TAVILY_API_KEY
      BaseUrl: "https://api.tavily.com"
      SearchDepth: "basic"          # basic | fast | advanced | ultra-fast
      Topic: "general"              # general | news | finance
    DuckDuckGo:
      MaxResults: 10
      Region: "wt-wt"
      SafeSearch: "Moderate" # Off, Moderate, Strict
  Unstructured:
    ApiKey: ""
    BaseUrl: "https://api.unstructured.io/general/v0/general"
  Pinecone:
    ApiKey: ""
    Host: ""
    Namespace: "default"
    IndexName: ""
  Embedding:
    Type: "qwen" # qwen, openai
    ApiKey: ""
    BaseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    Model: "text-embedding-v2"
    Dimensions: 1024
  LocalBrowser:
    Enabled: false
    MaxConcurrency: 3
    TotalTimeoutSec: 60
    NavigateTimeoutSec: 30
    WaitSelectorTimeoutSec: 20
    AllowedDomains: [] # 为空表示不限制；生产环境建议显式配置白名单
    ChromePath: "" # 可选：自定义 Chromium 可执行文件路径
    Headless: true
    CookieStoreDir: "storage/app/browser_cookies"
